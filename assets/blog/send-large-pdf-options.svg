d</text><rect x="245" y="209" width="300" height="48" rx="10" fill="#fff" stroke="#1f9d63" stroke-width="2"/><circle cx="272" cy="233" r="8" fill="#1f9d63"/><text x="292" y="228" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#16161d" text-anchor="start">Share link</text><text x="292" y="246" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b6b76" text-anchor="start">no size limit</text>
