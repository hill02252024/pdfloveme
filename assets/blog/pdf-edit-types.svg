<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img">
<rect width="600" height="300" fill="#fbfaf7"/>
<text x="400" y="40" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#16161d" text-anchor="middle">Three kinds of PDF editing (easiest first)</text><rect x="80" y="80" width="440" height="56" rx="10" fill="#fff" stroke="#1f9d63" stroke-width="2"/><rect x="80" y="80" width="8" height="56" rx="4" fill="#1f9d63"/><text x="108" y="106" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#16161d" text-anchor="start">Annotate</text><text x="108" y="125" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b6b76" text-anchor="start">highlight, comment, sign</text><text x="500" y="113" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1f9d63" text-anchor="end">Easy</text><rect x="80" y="150" width="440" height="56" rx="10" fill="#fff" stroke="#ff5d52" stroke-width="2"/><rect x="80" y="150" width="8" height="56" rx="4" fill="#ff5d52"/><text x="108" y="176" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#16161d" text-anchor="start">Text edit</text><text x="108" y="195" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b6b76" text-anchor="start">change words in place</text><text x="500" y="183" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ff5d52" text-anchor="end">Medium</text><rect x="80" y="220" width="440" height="56" rx="10" fill="#fff" stroke="#16161d" stroke-width="2"/><rect x="80" y="220" width="8" height="56" rx="4" fill="#16161d"/><text x="108" y="246" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#16161d" text-anchor="start">Layout edit</text><text x="108" y="265" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b6b76" text-anchor="start">move blocks, redesign</text><text x="500" y="253" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16161d" text-anchor="end">Hard</text>
