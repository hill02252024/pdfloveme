<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img">
<rect width="600" height="300" fill="#fbfaf7"/>
<text x="400" y="40" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#16161d" text-anchor="middle">Open password vs permission password</text><rect x="70" y="80" width="200" height="200" rx="6" fill="#ffffff" stroke="#16161d" stroke-width="2.5"/><text x="170" y="108" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#16161d" text-anchor="middle">open password</text><circle cx="170" cy="175" r="34" fill="none" stroke="#ff5d52" stroke-width="6"/><rect x="156" y="172" width="28" height="22" rx="3" fill="#ff5d52"/><path d="M159 172 v-6 a11 11 0 0 1 22 0 v6" fill="none" stroke="#ff5d52" stroke-width="5"/><text x="170" y="245" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6b76" text-anchor="middle">no password, no view</text><rect x="330" y="80" width="200" height="200" rx="6" fill="#ffffff" stroke="#e7e4dc" stroke-width="2.5"/><text x="430" y="108" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b6b76" text-anchor="middle">permission password</text><text x="360" y="148" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f9d63" text-anchor="start">view  ✓</text><text x="360" y="178" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b6b76" text-anchor="start">print  ✕</text><text x="360" y="208" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b6b76" text-anchor="start">copy  ✕</text><text x="360" y="238" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b6b76" text-anchor="start">edit  ✕</text><text x="430" y="250" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6b76" text-anchor="middle">opens, but actions limited</text>
</svg>